<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Connexion Administrateur</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family:'Segoe UI',sans-serif;
      background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460);
      min-height:100vh;
      display:flex; align-items:center; justify-content:center;
    }
    .card {
      background:rgba(255,255,255,0.05);
      backdrop-filter:blur(16px);
      border:1px solid rgba(255,255,255,0.1);
      border-radius:20px;
      padding:48px 40px;
      width:100%; max-width:420px;
      box-shadow:0 25px 50px rgba(0,0,0,0.4);
    }
    .icon { text-align:center; font-size:52px; margin-bottom:8px; }
    h1 { color:#fff; text-align:center; font-size:22px; font-weight:700; margin-bottom:6px; }
    .subtitle { color:rgba(255,255,255,0.4); text-align:center; font-size:13px; margin-bottom:32px; }

    label {
      display:block; color:rgba(255,255,255,0.65);
      font-size:12px; font-weight:600;
      text-transform:uppercase; letter-spacing:0.5px; margin-bottom:6px;
    }
    input {
      width:100%; background:rgba(255,255,255,0.08);
      border:1px solid rgba(255,255,255,0.15);
      border-radius:10px; padding:13px 16px;
      color:#fff; font-size:14px; margin-bottom:20px;
      outline:none; transition:border-color 0.2s;
    }
    input:focus { border-color:#00acc1; }
    input::placeholder { color:rgba(255,255,255,0.3); }

    button {
      width:100%;
      background:linear-gradient(135deg,#00acc1,#0077b6);
      color:white; border:none; border-radius:10px;
      padding:14px; font-size:15px; font-weight:600;
      cursor:pointer; transition:opacity 0.2s, transform 0.1s;
    }
    button:hover { opacity:0.92; transform:translateY(-1px); }

    .error {
      background:rgba(229,57,53,0.15); border:1px solid rgba(229,57,53,0.4);
      color:#ff6b6b; border-radius:10px;
      padding:12px 16px; font-size:13px; margin-bottom:20px; text-align:center;
    }
    .link { text-align:center; margin-top:20px; color:rgba(255,255,255,0.4); font-size:13px; }
    .link a { color:#00acc1; text-decoration:none; }
  </style>
</head>
<body>
<div class="card">
  <div class="icon">⚙️</div>
  <h1>Espace Administrateur</h1>
  <p class="subtitle">Accès réservé aux administrateurs</p>

  {% if error %}
    <div class="error">{{ error }}</div>
  {% endif %}

  <form method="POST">
    {% csrf_token %}
    <label>Nom d'utilisateur</label>
    <input type="text" name="username" placeholder="admin" required autofocus/>
    <label>Mot de passe</label>
    <input type="password" name="password" placeholder="••••••••" required/>
    <button type="submit">Se connecter →</button>
  </form>

  <div class="link">
    Vous êtes étudiant ? <a href="{% url 'login' %}">Connexion étudiant</a>
  </div>
</div>
</body>
</html>
